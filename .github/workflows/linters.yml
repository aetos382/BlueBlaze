name: linters

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      NO_COLOR: "1"
      # renovate: datasource=github-releases depName=rhysd/actionlint
      ACTIONLINT_VERSION: v1.7.12

      # renovate: datasource=github-releases depName=koalaman/shellcheck
      SHELLCHECK_VERSION: v0.11.0

      # renovate: datasource=github-releases depName=suzuki-shunsuke/ghalint
      GHALINT_VERSION: v1.5.6

      # renovate: datasource=github-releases depName=zizmorcore/zizmor
      ZIZMOR_VERSION: v1.25.2

      # renovate: datasource=github-releases depName=koki-develop/ghasec
      GHASEC_VERSION: v0.14.0

      # renovate: datasource=github-releases depName=hadolint/hadolint
      HADOLINT_VERSION: v2.14.0

    steps:

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install actionlint
        run: |
          mkdir -p "${HOME}/.local/actionlint"
          curl -fqsLS "https://github.com/rhysd/actionlint/releases/download/${{ env.ACTIONLINT_VERSION }}/actionlint_${ACTIONLINT_VERSION#v}_linux_amd64.tar.gz" -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz -C "${HOME}/.local/actionlint"
          echo "${HOME}/.local/actionlint" >> "$GITHUB_PATH"
          rm actionlint.tar.gz

      - name: Install shellcheck
        run: |
          mkdir -p "${HOME}/.local/shellcheck"
          curl -fqsLS "https://github.com/koalaman/shellcheck/releases/download/${{ env.SHELLCHECK_VERSION }}/shellcheck-${{ env.SHELLCHECK_VERSION }}.linux.x86_64.tar.gz" -o shellcheck.tar.gz
          tar -xzf shellcheck.tar.gz -C "${HOME}/.local/shellcheck" --strip-components=1
          echo "${HOME}/.local/shellcheck" >> "$GITHUB_PATH"
          rm shellcheck.tar.gz

      - name: Install ghalint
        run: |
          mkdir -p "${HOME}/.local/ghalint"
          curl -fqsLS "https://github.com/suzuki-shunsuke/ghalint/releases/download/${{ env.GHALINT_VERSION }}/ghalint_${GHALINT_VERSION#v}_linux_amd64.tar.gz" -o ghalint.tar.gz
          tar -xzf ghalint.tar.gz -C "${HOME}/.local/ghalint"
          echo "${HOME}/.local/ghalint" >> "$GITHUB_PATH"
          rm ghalint.tar.gz

      - name: Install zizmor
        run: |
          mkdir -p "${HOME}/.local/zizmor"
          curl -fqsLS "https://github.com/zizmorcore/zizmor/releases/download/${{ env.ZIZMOR_VERSION }}/zizmor-x86_64-unknown-linux-gnu.tar.gz" -o zizmor.tar.gz
          tar -xzf zizmor.tar.gz -C "${HOME}/.local/zizmor"
          echo "${HOME}/.local/zizmor" >> "$GITHUB_PATH"
          rm zizmor.tar.gz

      - name: Install ghasec
        run: |
          mkdir -p "${HOME}/.local/ghasec"
          curl -fqsLS "https://github.com/koki-develop/ghasec/releases/download/${{ env.GHASEC_VERSION }}/ghasec_Linux_x86_64.tar.gz" -o ghasec.tar.gz
          tar -xzf ghasec.tar.gz -C "${HOME}/.local/ghasec"
          echo "${HOME}/.local/ghasec" >> "$GITHUB_PATH"
          rm ghasec.tar.gz

      - name: Install hadolint
        run: |
          mkdir -p "${HOME}/.local/hadolint"
          curl -fqsLS "https://github.com/hadolint/hadolint/releases/download/${{ env.HADOLINT_VERSION }}/hadolint-linux-x86_64" -o "${HOME}/.local/hadolint/hadolint"
          chmod +x "${HOME}/.local/hadolint/hadolint"
          echo "${HOME}/.local/hadolint" >> "$GITHUB_PATH"

      - name: Run actionlint
        continue-on-error: true
        run: |
          set +e
          actionlint --verbose 2>&1 | tee /tmp/actionlint.txt
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -ne 0 ]; then
            {
              printf '## actionlint\n```\n'
              cat /tmp/actionlint.txt
              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"

      - name: Run shellcheck
        continue-on-error: true
        run: |
          set +e
          find . -name '*.sh' -not -path './submodules/*' -print0 | xargs -r -0 shellcheck 2>&1 | tee /tmp/shellcheck.txt
          exit_code=${PIPESTATUS[1]}
          if [ "$exit_code" -ne 0 ]; then
            {
              printf '## shellcheck\n```\n'
              cat /tmp/shellcheck.txt
              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"

      - name: Run ghalint
        continue-on-error: true
        run: |
          set +e
          ghalint run 2>&1 | tee /tmp/ghalint.txt
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -ne 0 ]; then
            {
              printf '## ghalint\n```\n'
              cat /tmp/ghalint.txt
              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"

      - name: Run zizmor
        continue-on-error: true
        run: |
          set +e
          zizmor --pedantic --no-progress --gh-token ${{ secrets.GITHUB_TOKEN }} .github/workflows/ 2>&1 | tee /tmp/zizmor.txt
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -ne 0 ]; then
            {
              printf '## zizmor\n```\n'
              cat /tmp/zizmor.txt
              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"

      - name: Run ghasec
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ghasec --online 2>&1 | tee /tmp/ghasec.txt
          exit_code=${PIPESTATUS[0]}
          if [ "$exit_code" -ne 0 ]; then
            {
              printf '## ghasec\n```\n'
              cat /tmp/ghasec.txt
              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"

      - name: Run hadolint
        continue-on-error: true
        run: |
          set +e
          find . -name 'Dockerfile*' -not -path './submodules/*' -print0 | xargs -r -0 hadolint --failure-threshold warning 2>&1 | tee /tmp/hadolint.txt
          exit_code=${PIPESTATUS[1]}
          if [ "$exit_code" -ne 0 ]; then
            {
              printf '## hadolint\n```\n'
              cat /tmp/hadolint.txt
              printf '```\n'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
          exit "$exit_code"
