name: Component Detection

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * 2'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  dependency-submission:
    name: Dependency Submission
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build LexiconGenerator.Cli
        run: dotnet publish Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj -o "${{ runner.temp }}/bbgen"

      - name: Build
        run: >
          dotnet build
          --configuration Release
          --no-incremental
          --no-logo
          -p:BlueBlazeGeneratorCliExe="${{ runner.temp }}/bbgen/BlueBlaze.LexiconGenerator.Cli"
          -binaryLogger

      - name: Component Detection
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927 # v0.1.1
        with:
          detectorArgs: DockerReference=Enable,DockerCompose=Enable,MSBuildBinaryLog=EnableIfDefaultOff
          detectorsCategories: NuGet,Npm,DockerReference,DockerCompose
