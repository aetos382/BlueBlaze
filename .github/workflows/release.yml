name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  pack:
    name: Pack (any)
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build LexiconGenerator.Cli
        run: dotnet publish Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj -o "${{ runner.temp }}/bbgen"

      - name: Pack
        run: >
          dotnet pack BlueBlaze.slnx
          --configuration Release
          -p:Version=${{ inputs.version }}
          -p:GenerateSBOM=true
          -p:BlueBlazeGeneratorCliExe="${{ runner.temp }}/bbgen/BlueBlaze.LexiconGenerator.Cli"
          -bl:pack.binlog
          --no-logo

      - parallel:
        - name: Upload nupkg
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: nupkgs-any
            path: artifacts/package/release/*.nupkg
            compression-level: 0

        - name: Upload snupkg
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: snupkgs-any
            path: artifacts/package/release/*.snupkg
            compression-level: 0

        - name: Upload binlog
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          if: always()
          with:
            name: binlogs-any
            path: pack.binlog
            compression-level: 0

  pack-native:
    name: Pack (${{ matrix.rid }})

    strategy:
      matrix:
        include:
          - os: windows-2025-vs2026
            rid: win-x64
            exe: .exe
          - os: windows-11-vs2026-arm
            rid: win-arm64
            exe: .exe
          - os: ubuntu-slim
            rid: linux-x64
          - os: ubuntu-26.04-arm
            rid: linux-arm64
          - os: macos-26
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build LexiconGenerator.Cli
        run: dotnet publish Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj -o "${{ runner.temp }}/bbgen"

      - name: Pack LexiconGenerator.Cli
        run: >
          dotnet pack Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          -p:Version=${{ inputs.version }}
          -p:GenerateSBOM=true
          -bl:lexgen-cli-${{ matrix.rid }}.binlog
          --no-logo

      - name: Pack Application.Cli
        run: >
          dotnet pack Sources/Applications/Cli/Application.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          -p:Version=${{ inputs.version }}
          -p:GenerateSBOM=true
          -p:BlueBlazeGeneratorCliExe="${{ runner.temp }}/bbgen/BlueBlaze.LexiconGenerator.Cli${{ matrix.exe }}"
          -bl:client-cli-${{ matrix.rid }}.binlog
          --no-logo

      - parallel:
        - name: Upload nupkg
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: nupkgs-${{ matrix.rid }}
            path: artifacts/package/release/*.nupkg
            compression-level: 0

        - name: Upload binlog
          uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          if: always()
          with:
            name: binlogs-${{ matrix.rid }}
            path: '*-${{ matrix.rid }}.binlog'
            compression-level: 0

  merge:
    name: Merge artifacts
    needs: [pack, pack-native]
    if: always()
    runs-on: ubuntu-slim

    steps:
      - parallel:
        - name: Merge nupkgs
          uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          with:
            name: nupkgs
            pattern: nupkgs-*
            delete-merged: true
            compression-level: 0

        - name: Merge binlogs
          uses: actions/upload-artifact/merge@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
          if: always()
          with:
            name: binlogs
            pattern: binlogs-*
            delete-merged: true
            compression-level: 0

  publish:
    name: Publish
    needs: [pack, pack-native, merge]
    runs-on: ubuntu-slim

    permissions:
      contents: write
      packages: write

    env:
      NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.0.x
          cache: false

      - parallel:
        - name: Download nupkgs
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: nupkgs-*
            path: packages
            merge-multiple: true

        - name: Download snupkgs
          uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
          with:
            pattern: snupkgs-*
            path: packages
            merge-multiple: true

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "packages/*.nupkg"
          --api-key "${{ secrets.GITHUB_TOKEN }}"
          --source "${{ env.NUGET_FEED_URL }}"
          --skip-duplicate

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${VERSION}" \
            packages/*.nupkg \
            packages/*.snupkg \
            --repo "${REPO}" \
            --draft \
            --generate-notes \
            --title "v${VERSION}" \
            ${PRERELEASE_FLAG}
