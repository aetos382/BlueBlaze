name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.2.3)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  pack:
    name: Pack
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
          cache: false
          cache-dependency-path: '**/packages.lock.json'

      - name: Pack
        run: >
          dotnet pack BlueBlaze.slnx
          --configuration Release
          -p:Version=${{ inputs.version }}
          -p:GenerateSBOM=true
          -bl:pack.binlog
          --no-logo

      - name: Upload nupkg
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkgs-any
          path: artifacts/package/release/*.nupkg
          compression-level: 0

      - name: Upload snupkg
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: snupkgs-any
          path: artifacts/package/release/*.snupkg
          compression-level: 0

      - name: Upload binlog
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: binlogs-any
          path: pack.binlog
          compression-level: 0

  pack-native:
    name: Pack NativeAOT (${{ matrix.rid }})

    strategy:
      matrix:
        include:
          - os: ubuntu-slim
            rid: linux-x64
          - os: windows-latest
            rid: win-x64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
          cache: false
          cache-dependency-path: '**/packages.lock.json'

      - name: Pack LexiconGenerator.Cli
        run: >
          dotnet pack Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj
          --configuration Release
          -r ${{ matrix.rid }}
          -p:Version=${{ inputs.version }}
          -p:GenerateSBOM=true
          -bl:lexgen-cli-${{ matrix.rid }}.binlog
          --no-logo

      - name: Pack Client.Cli
        run: >
          dotnet pack Sources/Clients/Cli/Client.Cli.csproj
          --configuration Release
          -r ${{ matrix.rid }}
          -p:Version=${{ inputs.version }}
          -p:GenerateSBOM=true
          -bl:client-cli-${{ matrix.rid }}.binlog
          --no-logo

      - name: Upload nupkg
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: nupkgs-${{ matrix.rid }}
          path: artifacts/package/release/*.nupkg
          compression-level: 0

      - name: Upload binlog
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: binlogs-${{ matrix.rid }}
          path: '*-${{ matrix.rid }}.binlog'
          compression-level: 0

  publish:
    name: Publish
    needs: [pack, pack-native]
    runs-on: ubuntu-slim

    env:
      NUGET_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
          cache: false
          source-url: ${{ env.NUGET_FEED_URL }}
        env:
          NUGET_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Download nupkg
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nupkgs-*
          path: packages
          merge-multiple: true

      - name: Download snupkg
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: nupkgs-*
          path: packages
          merge-multiple: true

      - name: Push to GitHub Packages
        run: dotnet nuget push "packages/*.nupkg" --skip-duplicate --timeout 600

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${VERSION}" \
            packages/*.nupkg \
            packages/*.snupkg \
            --repo "${REPO}" \
            --draft \
            --generate-notes \
            --title "v${VERSION}" \
            ${PRERELEASE_FLAG}
