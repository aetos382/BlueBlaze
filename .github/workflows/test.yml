name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Cache LexiconGenerator.Cli
        id: bbgen-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/bbgen
          key: bbgen_ubuntu-latest_${{ hashFiles('global.json', 'Directory.Build.props', 'Directory.Build.targets', 'Directory.Packages.props', 'BeforeMicrosoftNETSdkTargets.targets', 'Generators/LexiconGenerator/Cli/**', 'Generators/LexiconGenerator/Core/**') }}

      - name: Build LexiconGenerator.Cli
        if: steps.bbgen-cache.outputs.cache-hit != 'true'
        run: dotnet publish Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj -o "${{ runner.temp }}/bbgen"

      - name: Build (全 TargetFramework の検証)
        # dotnet test は --framework net10.0 に限定しているため、net481 等
        # 他の TargetFramework はここでビルドのみ実行してコンパイルエラーを検出する。
        run: >
          dotnet build BlueBlaze.slnx
          --no-logo
          -p:BlueBlazeGeneratorCliExe="${{ runner.temp }}/bbgen/BlueBlaze.LexiconGenerator.Cli"

      - name: Test
        run: >
          dotnet test BlueBlaze.slnx
          --framework net10.0
          --coverage
          --coverage-output-format cobertura
          --report-trx
          -p:BlueBlazeGeneratorCliExe="${{ runner.temp }}/bbgen/BlueBlaze.LexiconGenerator.Cli"
          -bl:${{ runner.temp }}/test.binlog

      - name: Upload Binlog
        # ビルド失敗解析ワークフロー(build-failure-analysis.md)が参照する。
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-binlog
          path: ${{ runner.temp }}/test.binlog
          if-no-files-found: warn
          retention-days: 1

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: '!cancelled()'
        with:
          files: TestResults/*.trx

      - name: Merge Coverage Reports
        if: '!cancelled()'
        # dotnet test --coverage-output-format cobertura が生成する Cobertura ファイルは
        # ルートの <coverage> 要素に lines-covered / lines-valid 属性を含まない場合があり、
        # irongut/CodeCoverageSummary がパースエラーで終了してしまう。
        # dotnet-coverage merge で統合することでこれらの属性が補完される。
        run: |
          dotnet tool install --global dotnet-coverage
          dotnet-coverage merge TestResults/*.cobertura.xml \
            --output coverage.cobertura.xml \
            --output-format cobertura

      - name: Generate Coverage Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: '!cancelled()'
        with:
          filename: coverage.cobertura.xml
          format: markdown
          output: both

      - name: Add Coverage Summary
        if: '!cancelled()'
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: '!cancelled()'
        with:
          name: coverage
          path: coverage.cobertura.xml
