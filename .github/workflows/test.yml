name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Build LexiconGenerator.Cli
        run: dotnet publish Generators/LexiconGenerator/Cli/LexiconGenerator.Cli.csproj -o "${{ runner.temp }}/bbgen"

      - name: Test
        run: >
          dotnet test BlueBlaze.slnx
          --framework net10.0
          --coverage
          --coverage-output-format cobertura
          --report-trx
          -p:BlueBlazeGeneratorCliExe="${{ runner.temp }}/bbgen/BlueBlaze.LexiconGenerator.Cli"

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@d0a4676d0e0b938bc201470d88276b7c74c712b3 # v2.24.0
        if: '!cancelled()'
        with:
          files: artifacts/bin/**/TestResults/*.trx

      - name: Merge Coverage Reports
        if: '!cancelled()'
        # dotnet test --coverage-output-format cobertura が生成する Cobertura ファイルは
        # ルートの <coverage> 要素に lines-covered / lines-valid 属性を含まない場合があり、
        # irongut/CodeCoverageSummary がパースエラーで終了してしまう。
        # dotnet-coverage merge で統合することでこれらの属性が補完される。
        run: |
          dotnet tool install --global dotnet-coverage
          shopt -s globstar
          dotnet-coverage merge artifacts/bin/**/TestResults/*.cobertura.xml \
            --output coverage.cobertura.xml \
            --output-format cobertura

      - name: Generate Coverage Report
        uses: irongut/CodeCoverageSummary@51cc3a756ddcd398d447c044c02cb6aa83fdae95 # v1.3.0
        if: '!cancelled()'
        with:
          filename: coverage.cobertura.xml
          format: markdown
          output: both

      - name: Add Coverage Summary
        if: '!cancelled()'
        run: cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Coverage Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: '!cancelled()'
        with:
          name: coverage
          path: coverage.cobertura.xml
