name: Package Integration Test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-integration:
    name: Package Integration Test
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Pack
        run: >
          dotnet pack
          Generators/Generators.Package/Generators.Package.csproj
          --configuration Release
          --no-logo

      - name: Verify package consumption
        run: dotnet build PackageTest/PackageTest.slnx --no-logo
