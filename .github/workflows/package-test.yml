name: Package Integration Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package-integration:
    name: Package Integration Test
    runs-on: ubuntu-slim

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.0.x
          dotnet-quality: ga
          cache: false

      - name: Pack
        run: >
          dotnet pack
          Generators/LexiconGenerator/Package/LexiconGenerator.Package.csproj
          --configuration Release
          --no-logo

      - name: Verify package consumption
        run: dotnet build PackageTest/PackageTest.slnx --no-logo
